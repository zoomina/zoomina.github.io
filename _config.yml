# Multi-language settings (without plugin)
default_lang: "en"
languages: ["en", "ko"]

# Multi-language content
lang:
  en:
    nav:
      portfolio: "Portfolio"
      about: "About"
      contact: "Contact"
    about:
      title: "About"
      content_1: "I am a data analyst with experience in marketing analytics and customer data platform (CDP) environments. Building on metric analysis and performance interpretation, I have developed a broader interest in understanding and structuring the end-to-end data flow—from data generation to downstream analytical use."
      content_2: "With hands-on experience in performance marketing, CDP and analytics tool integrations, and automation using SQL and Python, I am shaping my career toward analytics engineering. My goal is to design stable data pipelines and standardized data models that allow analytical outputs to be consistently reused across teams and support long-term decision-making."
  ko:
    nav:
      portfolio: "Portfolio"
      about: "About"
      contact: "Contact"
    about:
      title: "About"
      content_1: "마케팅 데이터와 고객 데이터 플랫폼(CDP) 환경에서 데이터 분석 업무를 수행해 온 데이터 분석가입니다. 지표 분석과 성과 해석을 기반으로, 데이터가 생성·적재·활용되는 전반적인 흐름을 이해하고 이를 구조화하는 역할에 관심을 가져왔습니다."
      content_2: "퍼포먼스 마케팅, CDP 및 분석 도구 연계, SQL·Python 기반 자동화 경험을 바탕으로 현재는 애널리틱스 엔지니어를 커리어 방향으로 설정하고 있습니다. 분석 결과가 일회성 인사이트에 머무르지 않고 조직 내에서 지속적으로 활용될 수 있도록, 안정적인 데이터 파이프라인과 표준화된 데이터 구조를 설계하는 것을 목표로 합니다."

#for posts
defaults:
