  primary-rgb: "0,169,224"
  secondary: 2D3E50      # 서브(네이비/텍스트/헤더)
  secondary-dark: 1F2B3A # 서브 딥톤(푸터/진한 배경/호버)

# Footer settings
footer:
  copyright: Dr. Henry Jekyll
  location: Location
  social: Around the Web
  credits: Credits

