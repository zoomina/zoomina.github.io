about:
  title: "About"
  content_1: "마케팅 데이터와 고객 데이터 플랫폼(CDP) 환경에서 데이터 분석 업무를 수행해 온 데이터 분석가입니다. 단편적인 지표 해석보다는, 조직 내 여러 시스템에서 생성되는 데이터를 일관된 기준으로 정리하고 신뢰 가능한 분석 환경을 구축하는 데 관심을 두고 있습니다."
  content_2: "퍼포먼스 마케팅, CDP 및 분석 도구 연계, SQL·Python 기반 자동화 경험을 바탕으로 현재는 애널리틱스 엔지니어를 커리어 방향으로 설정하고 있습니다. 분석 결과가 개인의 해석에 의존하지 않고 조직 전반에서 반복 활용될 수 있도록, 안정적인 데이터 파이프라인과 표준화된 데이터 구조를 설계하는 것을 목표로 합니다."

